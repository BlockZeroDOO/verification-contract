limit_req_zone $binary_remote_addr zone=denotary_api_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=denotary_conn_per_ip:10m;

server {
    listen 443 ssl http2;
    server_name receipt.denotary.io audit.denotary.io;

    # Replace with production certificates or ACME-managed paths.
    ssl_certificate /etc/letsencrypt/live/denotary/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/denotary/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    access_log /var/log/nginx/denotary-access.log;
    error_log /var/log/nginx/denotary-error.log warn;

    client_max_body_size 1m;
    keepalive_timeout 15;

    location /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8082;
    }

    location /v1/receipts/ {
        limit_req zone=denotary_api_per_ip burst=20 nodelay;
        limit_conn denotary_conn_per_ip 20;
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v1/audit/ {
        limit_req zone=denotary_api_per_ip burst=20 nodelay;
        limit_conn denotary_conn_per_ip 20;
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /docs {
        limit_req zone=denotary_api_per_ip burst=10 nodelay;
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /openapi.json {
        limit_req zone=denotary_api_per_ip burst=10 nodelay;
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Keep the finality watcher private. Do not expose port 8081 publicly.
